<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Login</title>

<style>
/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Segoe UI", sans-serif;
}

/* BODY */
body{
    background: linear-gradient(135deg,#020617,#0f1724);
    color:#e5e7eb;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* LOGIN CARD */
.login-card{
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    padding:40px 35px;
    border-radius:18px;
    width:320px;
    box-shadow:0 15px 40px rgba(0,0,0,0.6);
}

/* TITLE */
.login-card h2{
    text-align:center;
    margin-bottom:25px;
    color:#00e5ff;
}

/* INPUTS */
.login-card input{
    width:100%;
    padding:14px;
    margin-bottom:15px;
    border-radius:10px;
    border:none;
    outline:none;
    background:rgba(255,255,255,0.15);
    color:white;
    font-size:15px;
}

.login-card input::placeholder{
    color:#cbd5e1;
}

/* BUTTON */
.login-card button{
    width:100%;
    padding:14px;
    border-radius:30px;
    border:none;
    cursor:pointer;
    font-size:16px;
    font-weight:bold;
    background:#00e5ff;
    color:#002b36;
    transition:0.3s;
}

.login-card button:hover{
    background:#00bcd4;
    box-shadow:0 0 18px rgba(0,229,255,0.8);
}

/* FOOTER TEXT */
.login-note{
    margin-top:18px;
    text-align:center;
    font-size:13px;
    color:#94a3b8;
}
</style>
</head>

<body>

<div class="login-card">
    <form method="post">
        <h2>🔐 Admin Login</h2>

        <input name="username" placeholder="Username" required>
        <input name="password" type="password" placeholder="Password" required>

        <button type="submit">Login</button>

        <div class="login-note">
            Authorized users only
        </div>
    </form>
</div>

</body>
</html>
